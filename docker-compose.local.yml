# Standalone local deployment — HTTP only, no SSL, no Certbot
# Usage: docker compose -f docker-compose.local.yml up --build -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pole_emploi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pole_emploi_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pole_emploi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      target: prod
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      target: prod
    restart: always
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://pole-emploi.guiguilab.local/api
    depends_on:
      - backend
    networks:
      - internal

  worker:
    build:
      context: ./workers
      target: worker
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  scheduler:
    build:
      context: ./workers
      target: scheduler
    restart: always
    env_file: .env
    command: ["celery", "-A", "tasks", "beat", "--loglevel=info",
              "--scheduler", "celery.beat:PersistentScheduler",
              "--schedule", "/app/celery-data/celerybeat-schedule"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - scheduler_data:/app/celery-data
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  db_data:
  redis_data:
  scheduler_data:

networks:
  internal:
    driver: bridge
